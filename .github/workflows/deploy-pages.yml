name: Deploy to GitHub Pages

# Deploys builds into one Pages artifact (the deploy-pages action replaces the
# whole site, so every slot must ship together):
#   root     → main                  at /starry-night          (production)
#   /dev     → dev                    at /starry-night/dev      (integration preview)
#   /preview → the workflow_dispatch branch, at /starry-night/preview (ad-hoc
#              feature-branch preview — e.g. to share with a remote tester)
# Triggered by pushes to main; use the "Run workflow" button (workflow_dispatch) and
# pick a branch to (re)build /dev AND publish that branch at /preview. The /dev and
# /preview builds are non-fatal (continue-on-error) so neither can block production.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

# #62: opt in to Node 24 ahead of GitHub's 2026-06-16 forced default —
# actions/deploy-pages@v4 (and friends) still declare Node 20, which the
# runner deprecation warning flags on every deploy.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # --- production: main → site root (/starry-night) ---
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Build main (root)
        working-directory: main-src
        env:
          NEXT_PUBLIC_BASE_PATH: /starry-night
          NEXT_OUTPUT_EXPORT: "true"
        run: |
          bun install --frozen-lockfile
          bun run build

      # --- preview: dev branch → site/dev (/starry-night/dev) ---
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src

      - name: Build dev (/dev)
        working-directory: dev-src
        continue-on-error: true # a broken dev must not block the production deploy
        env:
          NEXT_PUBLIC_BASE_PATH: /starry-night/dev
          NEXT_OUTPUT_EXPORT: "true"
        run: |
          bun install --frozen-lockfile
          bun run build

      # --- ad-hoc preview: the workflow_dispatch branch → site/preview ---
      # Pick any non-main branch in the "Run workflow" dropdown to publish it at
      # /starry-night/preview (share a feature branch with a remote tester without
      # merging to dev/main). Skipped on push and when run from main.
      - name: Checkout preview branch
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: preview-src

      - name: Build preview (/preview)
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
        working-directory: preview-src
        continue-on-error: true # a broken preview must not block production
        env:
          NEXT_PUBLIC_BASE_PATH: /starry-night/preview
          NEXT_OUTPUT_EXPORT: "true"
        run: |
          bun install --frozen-lockfile
          bun run build

      # --- assemble one artifact: root + /dev + (optional) /preview ---
      - name: Assemble site
        run: |
          mkdir -p site
          cp -r main-src/out/. site/
          if [ -d dev-src/out ]; then
            mkdir -p site/dev
            cp -r dev-src/out/. site/dev/
            echo "dev preview included"
          else
            echo "::warning::dev build produced no output — /dev not updated this run"
          fi
          if [ -d preview-src/out ]; then
            mkdir -p site/preview
            cp -r preview-src/out/. site/preview/
            echo "preview included (${{ github.ref_name }})"
          fi
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
