name: Deploy to GitHub Pages

# Deploys TWO builds into one Pages artifact (the deploy-pages action replaces the
# whole site, so root + /dev must ship together):
#   root  → main           at basePath /starry-night        (production)
#   /dev  → spike/city-scale at basePath /starry-night/dev   (in-progress preview)
# Triggered by pushes to main; use the "Run workflow" button (workflow_dispatch) to
# refresh /dev after committing to the spike branch. The /dev build is non-fatal
# (continue-on-error) so a broken spike can never block the production deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # --- production: main → site root (/starry-night) ---
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Build main (root)
        working-directory: main-src
        env:
          NEXT_PUBLIC_BASE_PATH: /starry-night
          NEXT_OUTPUT_EXPORT: "true"
        run: |
          bun install --frozen-lockfile
          bun run build

      # --- preview: spike/city-scale → site/dev (/starry-night/dev) ---
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: spike/city-scale
          path: dev-src

      - name: Build dev (/dev)
        working-directory: dev-src
        continue-on-error: true # a broken spike must not block the production deploy
        env:
          NEXT_PUBLIC_BASE_PATH: /starry-night/dev
          NEXT_OUTPUT_EXPORT: "true"
        run: |
          bun install --frozen-lockfile
          bun run build

      # --- assemble one artifact: root + /dev ---
      - name: Assemble site
        run: |
          mkdir -p site
          cp -r main-src/out/. site/
          if [ -d dev-src/out ]; then
            mkdir -p site/dev
            cp -r dev-src/out/. site/dev/
            echo "dev preview included"
          else
            echo "::warning::dev build produced no output — /dev not updated this run"
          fi
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
